<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>StrangerChat — Video + Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#080810;--surface:#11111c;--border:#22223a;
      --accent:#7c3aed;--accent2:#a855f7;--glow:rgba(124,58,237,.35);
      --text:#e8e8f0;--muted:#5a5a72;
      --you-bg:#1a0f33;--you-text:#c4b5fd;
      --them-bg:#13131f;--them-text:#e8e8f0;
      --danger:#ef4444;--success:#22c55e;--radius:12px;
    }
    html,body{height:100%;height:100dvh;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;overflow:hidden}
    #app{display:flex;flex-direction:column;height:100%;height:100dvh}

    /* Header */
    header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg)}
    .logo{font-size:1.2rem;font-weight:800;background:linear-gradient(135deg,#a855f7,#7c3aed,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .online-pill{display:flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:4px 10px;font-size:.72rem;font-family:'Space Mono',monospace;color:var(--muted)}
    .dot{width:6px;height:6px;border-radius:50%;background:var(--success);box-shadow:0 0 6px var(--success);animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    /* Welcome screen */
    #welcome-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:16px;padding:30px 24px;text-align:center}
    #welcome-screen .big{font-size:4rem;line-height:1}
    #welcome-screen h2{font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,#a855f7,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    #welcome-screen p{font-size:.9rem;color:var(--muted);max-width:300px;line-height:1.7}
    #btn-start-welcome{margin-top:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:var(--radius);padding:16px 40px;font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;cursor:pointer;box-shadow:0 0 30px var(--glow);width:100%;max-width:280px;transition:transform .1s}
    #btn-start-welcome:active{transform:scale(.97)}
    .features{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:4px}
    .feature-pill{background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:6px 14px;font-size:.75rem;color:var(--muted);font-family:'Space Mono',monospace}

    /* Chat screen */
    #chat-screen{display:none;flex-direction:column;flex:1;min-height:0}
    #chat-screen.active{display:flex}

    /* Videos */
    #videos{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:8px 12px 4px;flex-shrink:0}
    .video-wrap{position:relative;background:#0d0d18;border:1px solid var(--border);border-radius:10px;overflow:hidden;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center}
    .video-wrap video{width:100%;height:100%;object-fit:cover;display:block}
    .video-label{position:absolute;bottom:6px;left:8px;font-size:.62rem;font-family:'Space Mono',monospace;background:rgba(0,0,0,.65);color:#fff;padding:2px 7px;border-radius:999px}
    .video-placeholder{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--muted);font-size:.72rem;font-family:'Space Mono',monospace;text-align:center;padding:10px}
    .video-placeholder .icon{font-size:1.8rem;opacity:.5}

    /* Status */
    #status-bar{text-align:center;padding:4px 12px;font-size:.72rem;font-family:'Space Mono',monospace;color:var(--muted);flex-shrink:0}
    #status-bar.connected{color:var(--success)}
    #status-bar.waiting{color:var(--accent2)}
    #status-bar.error{color:var(--danger)}

    /* Media controls */
    #media-controls{display:flex;gap:8px;padding:4px 12px;flex-shrink:0;justify-content:center}
    .ctrl-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 14px;font-family:'Syne',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;flex:1;max-width:140px;transition:all .15s}
    .ctrl-btn.active{background:var(--danger);border-color:var(--danger);color:#fff}
    .ctrl-btn:disabled{opacity:.35;cursor:not-allowed}

    /* Chat window */
    #chat-window{flex:1;overflow-y:auto;padding:8px 12px;display:flex;flex-direction:column;gap:7px;scroll-behavior:smooth;min-height:0;-webkit-overflow-scrolling:touch}
    #chat-window::-webkit-scrollbar{width:3px}
    #chat-window::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
    .msg{display:flex;flex-direction:column;max-width:80%;animation:msgIn .18s ease}
    @keyframes msgIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
    .msg.you{align-self:flex-end;align-items:flex-end}
    .msg.them{align-self:flex-start;align-items:flex-start}
    .msg.system{align-self:center;align-items:center;max-width:100%}
    .msg-label{font-size:.58rem;font-family:'Space Mono',monospace;letter-spacing:.06em;margin-bottom:2px;color:var(--muted)}
    .msg.you .msg-label{color:#8b5cf6}
    .bubble{padding:8px 12px;border-radius:10px;font-size:.88rem;line-height:1.5;word-break:break-word}
    .msg.you .bubble{background:var(--you-bg);color:var(--you-text);border:1px solid #3b2060;border-bottom-right-radius:3px}
    .msg.them .bubble{background:var(--them-bg);color:var(--them-text);border:1px solid var(--border);border-bottom-left-radius:3px}
    .msg.system .bubble{background:transparent;color:var(--muted);font-size:.68rem;font-family:'Space Mono',monospace;border:1px dashed var(--border);border-radius:999px;padding:3px 12px}

    /* Typing */
    #typing-indicator{display:none;align-items:center;gap:6px;padding:2px 12px;font-size:.7rem;font-family:'Space Mono',monospace;color:var(--muted);flex-shrink:0}
    #typing-indicator.show{display:flex}
    .typing-dots span{display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--muted);margin:0 1px;animation:dot 1.2s infinite}
    .typing-dots span:nth-child(2){animation-delay:.2s}
    .typing-dots span:nth-child(3){animation-delay:.4s}
    @keyframes dot{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}

    /* Input */
    #input-row{display:flex;gap:6px;padding:6px 12px;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg)}
    #msg-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Syne',sans-serif;font-size:.88rem;padding:9px 12px;outline:none;resize:none;max-height:80px;-webkit-appearance:none;transition:border-color .2s}
    #msg-input:focus{border-color:var(--accent)}
    #msg-input::placeholder{color:var(--muted)}
    #msg-input:disabled{opacity:.4}
    #btn-send{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:8px;padding:9px 16px;font-family:'Syne',sans-serif;font-weight:700;font-size:.85rem;cursor:pointer;white-space:nowrap}
    #btn-send:disabled{opacity:.4;cursor:not-allowed}

    /* Action row */
    #action-row{display:flex;gap:8px;padding:8px 12px 14px;flex-shrink:0;background:var(--bg)}
    .action-btn{flex:1;border:none;border-radius:var(--radius);font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;padding:13px 10px;cursor:pointer;transition:all .15s}
    .action-btn:active{transform:scale(.97)}
    .action-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
    #btn-next{background:var(--surface);color:var(--text);border:1px solid var(--border)}
    #btn-stop{background:transparent;color:var(--danger);border:1px solid var(--danger)}
  </style>
</head>
<body>
<div id="app">

  <header>
    <div class="logo">StrangerChat</div>
    <div class="online-pill">
      <span class="dot"></span>
      <span id="online-count">0</span> online
    </div>
  </header>

  <!-- WELCOME SCREEN -->
  <div id="welcome-screen">
    <div class="big">👥</div>
    <h2>Talk to Strangers</h2>
    <p>Randomly matched with someone from around the world. Video, audio &amp; chat. No account needed.</p>
    <div class="features">
      <span class="feature-pill">📹 Video</span>
      <span class="feature-pill">🎤 Audio</span>
      <span class="feature-pill">💬 Chat</span>
    </div>
    <button id="btn-start-welcome">▶ Start Chatting</button>
  </div>

  <!-- CHAT SCREEN -->
  <div id="chat-screen">
    <div id="videos">
      <div class="video-wrap">
        <video id="local-video" autoplay muted playsinline></video>
        <div id="local-placeholder" class="video-placeholder"><div class="icon">📷</div><div>Camera off</div></div>
        <div class="video-label">YOU</div>
      </div>
      <div class="video-wrap">
        <video id="remote-video" autoplay playsinline></video>
        <div id="remote-placeholder" class="video-placeholder"><div class="icon">👤</div><div>Waiting…</div></div>
        <div class="video-label">STRANGER</div>
      </div>
    </div>

    <div id="status-bar">Looking for a stranger…</div>

    <div id="media-controls">
      <button class="ctrl-btn" id="btn-cam" disabled>📷 Cam On</button>
      <button class="ctrl-btn" id="btn-mic" disabled>🎤 Mic On</button>
    </div>

    <div id="chat-window"></div>

    <div id="typing-indicator">
      <span>Stranger typing</span>
      <span class="typing-dots"><span></span><span></span><span></span></span>
    </div>

    <div id="input-row">
      <textarea id="msg-input" rows="1" placeholder="Type a message…" disabled></textarea>
      <button id="btn-send" disabled>Send</button>
    </div>

    <div id="action-row">
      <button class="action-btn" id="btn-next" disabled>⏭ Next</button>
      <button class="action-btn" id="btn-stop" disabled>✕ Stop</button>
    </div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const welcomeScreen     = document.getElementById('welcome-screen');
const chatScreen        = document.getElementById('chat-screen');
const localVideo        = document.getElementById('local-video');
const remoteVideo       = document.getElementById('remote-video');
const localPlaceholder  = document.getElementById('local-placeholder');
const remotePlaceholder = document.getElementById('remote-placeholder');
const statusBar         = document.getElementById('status-bar');
const onlineCountEl     = document.getElementById('online-count');
const chatWindow        = document.getElementById('chat-window');
const msgInput          = document.getElementById('msg-input');
const btnSend           = document.getElementById('btn-send');
const btnStartWelcome   = document.getElementById('btn-start-welcome');
const btnNext           = document.getElementById('btn-next');
const btnStop           = document.getElementById('btn-stop');
const btnCam            = document.getElementById('btn-cam');
const btnMic            = document.getElementById('btn-mic');
const typingIndicator   = document.getElementById('typing-indicator');

let localStream=null,pc=null,isInitiator=false,chatActive=false,camOn=true,micOn=true,typingTimer=null,isTyping=false;

const RTC_CONFIG={iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]};
const socket=io();

function setStatus(t,c){statusBar.textContent=t;statusBar.className=c||''}
function addMsg(text,type){
  const w=document.createElement('div');w.className=`msg ${type}`;
  if(type!=='system'){const l=document.createElement('div');l.className='msg-label';l.textContent=type==='you'?'YOU':'STRANGER';w.appendChild(l)}
  const b=document.createElement('div');b.className='bubble';b.textContent=text;w.appendChild(b);
  chatWindow.appendChild(w);chatWindow.scrollTop=chatWindow.scrollHeight;
}
function setChatUI(a){chatActive=a;msgInput.disabled=!a;btnSend.disabled=!a;btnNext.disabled=!a;btnStop.disabled=!a;btnCam.disabled=!a;btnMic.disabled=!a;if(!a)typingIndicator.classList.remove('show')}
function showLocalPH(s){localPlaceholder.style.display=s?'flex':'none';localVideo.style.display=s?'none':'block'}
function showRemotePH(s){remotePlaceholder.style.display=s?'flex':'none';remoteVideo.style.display=s?'none':'block'}
function switchToChat(){welcomeScreen.style.display='none';chatScreen.classList.add('active')}
function switchToWelcome(){chatScreen.classList.remove('active');welcomeScreen.style.display='flex'}

async function getLocalStream(){
  try{
    localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
    localVideo.srcObject=localStream;showLocalPH(false);camOn=true;micOn=true;
  }catch(e){
    try{localStream=await navigator.mediaDevices.getUserMedia({video:false,audio:true});camOn=false;micOn=true;showLocalPH(true);}
    catch(e2){addMsg('Camera/mic blocked. Text only.','system');localStream=null;showLocalPH(true);}
  }
  updateCamBtn();updateMicBtn();
}

function createPC(){
  if(pc){pc.close();pc=null;}
  pc=new RTCPeerConnection(RTC_CONFIG);
  if(localStream)localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  pc.ontrack=e=>{remoteVideo.srcObject=e.streams[0];showRemotePH(false)};
  pc.onicecandidate=e=>{if(e.candidate)socket.emit('webrtc_ice',e.candidate)};
  pc.onconnectionstatechange=()=>{if(pc&&(pc.connectionState==='failed'||pc.connectionState==='disconnected'))showRemotePH(true)};
}

async function startCall(){
  createPC();
  if(isInitiator){const o=await pc.createOffer();await pc.setLocalDescription(o);socket.emit('webrtc_offer',o);}
}

socket.on('online_count',n=>onlineCountEl.textContent=n);
socket.on('waiting',()=>{setStatus('⌛ Looking for a stranger…','waiting');addMsg('Searching…','system')});
socket.on('matched',async({initiator})=>{
  isInitiator=initiator;chatWindow.innerHTML='';
  setStatus('🟢 Connected to a stranger!','connected');
  addMsg('Connected! Say hi 👋','system');
  setChatUI(true);showRemotePH(true);await startCall();
});
socket.on('webrtc_offer',async o=>{createPC();await pc.setRemoteDescription(new RTCSessionDescription(o));const a=await pc.createAnswer();await pc.setLocalDescription(a);socket.emit('webrtc_answer',a)});
socket.on('webrtc_answer',async a=>{if(pc)await pc.setRemoteDescription(new RTCSessionDescription(a))});
socket.on('webrtc_ice',async c=>{if(pc)try{await pc.addIceCandidate(new RTCIceCandidate(c))}catch(e){}});
socket.on('message',({text})=>{typingIndicator.classList.remove('show');addMsg(text,'them')});
socket.on('stranger_typing',v=>{typingIndicator.classList.toggle('show',v);chatWindow.scrollTop=chatWindow.scrollHeight});
socket.on('partner_disconnected',()=>{setStatus('🔴 Stranger disconnected','error');addMsg('Stranger has disconnected.','system');setChatUI(false);showRemotePH(true);if(pc){pc.close();pc=null;}remoteVideo.srcObject=null});
socket.on('stopped',()=>{setChatUI(false);showRemotePH(true);if(pc){pc.close();pc=null;}remoteVideo.srcObject=null;chatWindow.innerHTML='';switchToWelcome()});

btnStartWelcome.addEventListener('click',async()=>{
  switchToChat();
  if(!localStream)await getLocalStream();
  setStatus('⌛ Looking for a stranger…','waiting');
  socket.emit('find_stranger');
});
btnNext.addEventListener('click',()=>{
  if(pc){pc.close();pc=null;}remoteVideo.srcObject=null;showRemotePH(true);
  chatWindow.innerHTML='';setChatUI(false);setStatus('⌛ Finding next stranger…','waiting');socket.emit('skip');
});
btnStop.addEventListener('click',()=>socket.emit('stop'));

function updateCamBtn(){btnCam.textContent=camOn?'📷 Cam On':'📷 Cam Off';btnCam.classList.toggle('active',!camOn)}
function updateMicBtn(){btnMic.textContent=micOn?'🎤 Mic On':'🎤 Mic Off';btnMic.classList.toggle('active',!micOn)}
btnCam.addEventListener('click',()=>{if(!localStream)return;const t=localStream.getVideoTracks()[0];if(!t)return;camOn=!camOn;t.enabled=camOn;showLocalPH(!camOn);updateCamBtn()});
btnMic.addEventListener('click',()=>{if(!localStream)return;const t=localStream.getAudioTracks()[0];if(!t)return;micOn=!micOn;t.enabled=micOn;updateMicBtn()});

function sendMessage(){
  const text=msgInput.value.trim();if(!text||!chatActive)return;
  addMsg(text,'you');socket.emit('message',{text});msgInput.value='';msgInput.style.height='auto';
  socket.emit('typing',false);isTyping=false;
}
btnSend.addEventListener('click',sendMessage);
msgInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}});
msgInput.addEventListener('input',()=>{
  msgInput.style.height='auto';msgInput.style.height=Math.min(msgInput.scrollHeight,80)+'px';
  if(!isTyping){isTyping=true;socket.emit('typing',true);}
  clearTimeout(typingTimer);typingTimer=setTimeout(()=>{isTyping=false;socket.emit('typing',false)},1500);
});
</script>
</body>
</html>
